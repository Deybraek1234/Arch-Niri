format = """
[](fg:#924D5F)[ ](bg:#924D5F fg:#ffffff)$directory[](bg:#65656B fg:#924D5F)$username[](bg:#F57993 fg:#65656B)$hostname[](fg:#F57993)$cmd_duration$jobs$git_branch$git_metrics$git_status$fill$time$line_break$character
"""

command_timeout = 2000
scan_timeout = 500
add_newline = true

[character]
success_symbol = "[λ](bold #4BB0AB)"
error_symbol = "[Δ](bold #F57993)"

[directory]
truncation_length = 3
truncation_symbol = ".../"
read_only = "  "
style = "bg:#924D5F fg:#ffffff"
format = "[ $path ]($style)"

[fill]
symbol = " "

[cmd_duration]
min_time = 5
format = "[   $duration ](bold #ffffff)"

[hostname]
ssh_only = false
style = "bg:#F57993 fg:#ffffff"
format = "[ $hostname ]($style)"

[git_branch]
style = "fg:#ffffff"

[jobs]
symbol_threshold = 1
number_threshold = 2
symbol = "󱐌"
format = "[$symbol$number](bold #ffffff)"

[username]
show_always = true
style_user = "bg:#65656B fg:#ffffff"
style_root = "bg:#323344 fg:#909199"
format = "[ $user ]($style)"

[time]
disabled = false
format = "[$time](#ffffff)"
use_12hr = true
time_format = "%T"
utc_time_offset = "local"

[sudo]
symbol = " 󰐼 "
disabled = false
format = "[$symbol](bold #F57993)"

[line_break]
disabled = false
