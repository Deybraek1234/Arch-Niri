# The kitty terminal template for wallust
# Add to wallust config: kitty = { src='kitty.conf', dst='~/.config/kitty/colors.conf'}
# And add to kitty config: include colors.conf

cursor {{ cursor }}

background #000000
foreground #e0e0e0

color0 {{ color0 | lighten(0.2) }}
color1 {{ color1 | lighten(0.2)}}
color2 {{ color2 | lighten(0.2)}}
color3 {{ color3 | lighten(0.2)}}
color4 {{ color4 | lighten(0.2)}}
color5 {{ color5 | lighten(0.2)}}
color6 {{ color6 | lighten(0.2)}}
color7 {{ color7 | lighten(0.2)}}
color8 {{ color8 | lighten(0.2)}}
color9 {{ color9 | lighten(0.2)}}
color10 {{ color10 | lighten(0.2)}}
color11 {{ color11 | lighten(0.2)}}
color12 {{ color12 | lighten(0.2)}}
color13 {{ color13 | lighten(0.2)}}
color14 {{ color14 | lighten(0.2)}}
color15 {{ color15 | lighten(0.2)}}

mark1_foreground {{ color6 | saturate(0.2) }}
mark2_foreground {{ color7 | saturate(0.2) }}
mark3_foreground {{ color6 | saturate(0.2) }}

